<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Application Tailor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="jat-header">
        <a href="/" class="jat-brand" style="text-decoration:none;">
            <div class="jat-brand-name">JAT</div>
            <div class="sub">{% block brand_sub %}Job Application Tailor{% endblock %}</div>
        </a>
        <nav class="jat-nav">
            <a href="/" class="jat-nav-btn {% block nav_home %}{% endblock %}">New Job</a>
            <a href="/jobs" class="jat-nav-btn {% block nav_jobs %}{% endblock %}">Status</a>
            <a href="/history" class="jat-nav-btn {% block nav_history %}{% endblock %}">History</a>
            <a href="/sequencer" class="jat-nav-btn {% block nav_sequencer %}{% endblock %}">Sequencer</a>
            <a href="/pipeline" class="jat-nav-btn {% block nav_pipeline %}{% endblock %}">Pipeline</a>
            <a href="/manage-models" class="jat-nav-btn {% block nav_models %}{% endblock %}">Models</a>
        </nav>
    </div>
    <div class="jat-page">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
